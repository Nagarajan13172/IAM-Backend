version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Named volumes — data persists across container restarts
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# Custom network — services communicate by container name
# ─────────────────────────────────────────────────────────────────────────────
networks:
  iam_network:
    driver: bridge

services:
  # ───────────────────────────────────────────────────────────────────────────
  # MongoDB
  # ───────────────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: iam_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-iam_db}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - iam_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ───────────────────────────────────────────────────────────────────────────
  # IAM Backend — Express / Node.js API
  # ───────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: iam_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5000}
      # MongoDB URI references the 'mongo' service name on the Docker network
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-secret}@mongo:27017/${MONGO_DB:-iam_db}?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-changeme_super_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
    ports:
      - "${PORT:-5000}:5000"
    networks:
      - iam_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
